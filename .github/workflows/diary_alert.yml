name: Diary Alert

on:
  schedule:
    - cron: '30 22 * * *'   # KST 07:30 아침
    - cron: '0 13 * * *'    # KST 22:00 저녁
  workflow_dispatch:
    inputs:
      mode:
        description: '알림 종류 (morning/evening)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=evening" >> $GITHUB_OUTPUT
          fi

      - name: Send diary alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_diary_alert.py ${{ steps.mode.outputs.mode }}
